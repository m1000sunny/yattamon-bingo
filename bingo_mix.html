<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>やったもん勝ちビンゴ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap');

  :root {
    --cream: #FFF8F0;
    --accent: #E8634A;
    --accent2: #F0A050;
    --posi: #4AA86A;
    --posi2: #7DD49A;
    --dark: #3A2A1A;
    --mid: #8A6A50;
    --light: #D4B896;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 12px 48px;
    background-image: 
      radial-gradient(circle at 10% 20%, rgba(240,160,80,0.12) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(232,99,74,0.10) 0%, transparent 50%);
  }

  .header { text-align: center; margin-bottom: 20px; }

  .subtitle {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: var(--accent);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: clamp(20px, 5vw, 27px);
    font-weight: 900;
    color: var(--dark);
    line-height: 1.35;
    margin-bottom: 8px;
  }
  h1 span { color: var(--accent); }

  .desc { font-size: 12px; color: var(--mid); line-height: 1.7; }

  .legend {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-top: 10px;
    font-size: 11px;
    color: var(--mid);
    font-weight: 700;
  }
  .legend-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
  .dot-neg { background: var(--accent); }
  .dot-pos { background: var(--posi); }

  .bingo-wrap { width: 100%; max-width: 480px; }

  .bingo-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    width: 100%;
  }

  .cell {
    background: white;
    border-radius: 10px;
    padding: 8px 4px;
    text-align: center;
    cursor: pointer;
    border: 2px solid transparent;
    box-shadow: 0 2px 6px rgba(58,42,26,0.07);
    transition: transform 0.15s, box-shadow 0.15s;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    user-select: none;
    position: relative;
  }

  .cell.neg { border-top: 3px solid #F5C4BA; }
  .cell.pos { border-top: 3px solid #B4E4C4; }

  .cell:hover { transform: translateY(-2px); box-shadow: 0 5px 14px rgba(58,42,26,0.12); }

  .cell.neg.checked {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 4px 14px rgba(232,99,74,0.32);
    border-top-color: transparent;
  }
  .cell.pos.checked {
    background: linear-gradient(135deg, var(--posi), var(--posi2));
    box-shadow: 0 4px 14px rgba(74,168,106,0.32);
    border-top-color: transparent;
  }
  .cell.checked .cell-text { color: white; }
  .cell.checked .check-mark { opacity: 1; transform: scale(1); }

  .cell.free {
    background: linear-gradient(135deg, #3A2A1A, #6A4A2A);
    cursor: default;
    border-top: none;
  }
  .cell.free .cell-text { color: white; font-weight: 700; }

  .emoji { font-size: 18px; line-height: 1; }

  .cell-text {
    font-size: 10px;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.45;
  }

  .check-mark {
    position: absolute;
    top: 4px; right: 5px;
    font-size: 12px;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.2s, transform 0.2s;
    color: white;
  }

  .status-bar { margin-top: 20px; text-align: center; }

  .count-text {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    color: var(--mid);
  }
  .count-text strong { font-size: 22px; color: var(--accent); font-weight: 900; }

  .bingo-announce {
    margin-top: 12px;
    padding: 12px 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50px;
    color: white;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: 0.08em;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s, transform 0.4s;
    box-shadow: 0 4px 18px rgba(232,99,74,0.4);
    display: inline-block;
  }
  .bingo-announce.show { opacity: 1; transform: translateY(0); }

  .reset-btn {
    margin-top: 16px;
    background: none;
    border: 2px solid var(--light);
    color: var(--mid);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 7px 22px;
    border-radius: 50px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    display: block;
    margin-left: auto; margin-right: auto;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .footer-note {
    margin-top: 24px;
    font-size: 11px;
    color: var(--light);
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div class="header">
  <div class="subtitle">✦ チームやったもん勝ち 😎🏆 ✦</div>
  <h1>動いてるから<span>こそ</span>の<br>あるあるビンゴ</h1>
  <p class="desc">結果はネガでも、動きはポジ。<br>当てはまったらタップ！</p>
  <div class="legend">
    <span><span class="legend-dot dot-neg"></span>行動あるある</span>
    <span><span class="legend-dot dot-pos"></span>やったもん勝ち</span>
  </div>
</div>

<div class="bingo-wrap">
  <div class="bingo-grid" id="grid"></div>
</div>

<div class="status-bar">
  <div class="count-text">チェック済み <strong id="count">0</strong> / 24</div>
  <div class="bingo-announce" id="announce">🎉 BINGO！あなたは本物の戦士です！</div>
  <button class="reset-btn" onclick="resetBingo()">リセット</button>
</div>

<p class="footer-note">※失敗した数だけ、前に進んでる証拠！<br>ビンゴしたら仲間に見せよう😎</p>

<script>
const cells = [
  { emoji: "📱", text: "既読スルー\nされた", type: "neg" },
  { emoji: "😅", text: "「今忙しい」\n3回連続", type: "neg" },
  { emoji: "🙈", text: "紹介しようとして\n言葉に詰まった", type: "neg" },
  { emoji: "💨", text: "約束の日に\nドタキャンされた", type: "neg" },
  { emoji: "🌱", text: "FAN'S TV\n見た！", type: "pos" },
  { emoji: "🤔", text: "何から始めれば\nいいか迷ってる", type: "neg" },
  { emoji: "😭", text: "興味あり！から\n音信不通", type: "neg" },
  { emoji: "☕", text: "カフェで話したのに\nなんか違った", type: "neg" },
  { emoji: "📝", text: "資料作りに\n時間かけすぎた", type: "neg" },
  { emoji: "🌀", text: "説明してたら\n自分が混乱した", type: "neg" },
  { emoji: "😬", text: "「ちょっと考えます」\nから3週間", type: "neg" },
  { emoji: "🎯", text: "まだ始まってないけど\n準備は完璧！", type: "neg" },
  { emoji: "🌟", text: "FREE\nみんな一緒！", free: true },
  { emoji: "💬", text: "自分の話\nばかり喋りすぎた…", type: "neg" },
  { emoji: "🙃", text: "断られた後\n謎にヘコんだ", type: "neg" },
  { emoji: "📵", text: "電話しようと\n思って1週間", type: "neg" },
  { emoji: "😤", text: "「私には向いてない」\nと一瞬思った", type: "neg" },
  { emoji: "🫠", text: "SNS投稿しようと\n下書きだけ増える", type: "neg" },
  { emoji: "🎉", text: "交流会\n主催した！", type: "pos" },
  { emoji: "🌧️", text: "今日やろうと思ったけど\n明日やることにした", type: "neg" },
  { emoji: "💪", text: "断られても\nまだやってる", type: "pos" },
  { emoji: "🫣", text: "知り合いへの\n連絡が怖かった", type: "neg" },
  { emoji: "🤝", text: "初めての人に\n声をかけた", type: "pos" },
  { emoji: "📞", text: "きどりんに\n電話相談した！", type: "pos" },
  { emoji: "✨", text: "誰かの背中を\n押せた！", type: "pos" },
];

const SIZE = 5;
const LINES = [];
for(let i=0;i<SIZE;i++){
  LINES.push([...Array(SIZE)].map((_,j)=>i*SIZE+j));
  LINES.push([...Array(SIZE)].map((_,j)=>j*SIZE+i));
}
LINES.push([...Array(SIZE)].map((_,i)=>i*SIZE+i));
LINES.push([...Array(SIZE)].map((_,i)=>i*SIZE+(SIZE-1-i)));

let checked = new Set([12]);

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cells.forEach((c, i) => {
    const div = document.createElement('div');
    const typeClass = c.free ? 'free' : c.type;
    div.className = `cell ${typeClass}${checked.has(i) ? ' checked' : ''}`;
    div.innerHTML = `
      <div class="emoji">${c.emoji}</div>
      <div class="cell-text">${c.text.replace(/\n/g,'<br>')}</div>
      <div class="check-mark">✓</div>
    `;
    if (!c.free) div.onclick = () => toggle(i);
    grid.appendChild(div);
  });

  const userChecked = [...checked].filter(i => i !== 12).length;
  document.getElementById('count').textContent = userChecked;

  const hasBingo = LINES.some(line => line.every(i => checked.has(i)));
  const ann = document.getElementById('announce');
  hasBingo ? ann.classList.add('show') : ann.classList.remove('show');
}

function toggle(i) {
  checked.has(i) ? checked.delete(i) : checked.add(i);
  render();
}

function resetBingo() {
  checked = new Set([12]);
  render();
}

render();
</script>
</body>
</html>
